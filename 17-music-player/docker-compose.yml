services:
  db:
    image: mysql:8.4
    container_name: music-player-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: music_player
      MYSQL_USER: music_user
      MYSQL_PASSWORD: music_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music-player-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      CORS_ORIGIN: http://localhost:8080,http://localhost:8081
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 300
      LOG_LEVEL: info
      JWT_SECRET: replace_with_long_secure_secret
      JWT_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 12
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: music_user
      DB_PASSWORD: music_password
      DB_NAME: music_player
      DB_CONNECTION_LIMIT: 10
      MEDIA_ROOT: src/uploads
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api/v1
    container_name: music-player-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api/v1
    container_name: music-player-admin-panel
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
